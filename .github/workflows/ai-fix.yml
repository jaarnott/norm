name: AI Auto-Fix

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    name: AI Auto-Fix
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get failed workflow logs
        id: logs
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            let failureLogs = '';
            for (const job of jobs.data.jobs) {
              if (job.conclusion === 'failure') {
                try {
                  const log = await github.rest.actions.downloadJobLogsForWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    job_id: job.id,
                  });
                  failureLogs += `\n=== ${job.name} ===\n${log.data.toString().slice(-3000)}`;
                } catch (e) {
                  failureLogs += `\n=== ${job.name} ===\n(could not fetch logs)`;
                }
              }
            }
            core.setOutput('failure_logs', failureLogs.slice(-5000));

      - name: Run Claude Code to fix
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The CI pipeline failed on the main branch. Here are the failure logs:

            ${{ steps.logs.outputs.failure_logs }}

            Please fix the issue. Make minimal changes. If it's a lint/format issue, fix it directly.
            If it's a test failure or type error, fix the code.
            If you can't determine the fix, explain what went wrong.

          allowed_tools: "Edit,Write,Bash,Read,Glob,Grep"
          max_turns: 10

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine fix type
        id: fix_type
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          # If only lint/format changes (no .py logic or .tsx logic changes), push directly
          CHANGED=$(git diff --name-only)
          if echo "$CHANGED" | grep -qvE '\.(py|ts|tsx)$'; then
            echo "type=direct" >> "$GITHUB_OUTPUT"
          else
            echo "type=pr" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push (lint/format fixes)
        if: steps.changes.outputs.has_changes == 'true' && steps.fix_type.outputs.type == 'direct'
        run: |
          git config user.name "Claude AI"
          git config user.email "claude@anthropic.com"
          git add -A
          git commit -m "fix: auto-fix lint/format issues from CI

          Co-Authored-By: Claude Code <claude@anthropic.com>"
          git push

      - name: Create PR (code fixes)
        if: steps.changes.outputs.has_changes == 'true' && steps.fix_type.outputs.type == 'pr'
        run: |
          BRANCH="ai-fix/${{ github.event.workflow_run.head_sha }}"
          git config user.name "Claude AI"
          git config user.email "claude@anthropic.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix: AI auto-fix for CI failure

          Co-Authored-By: Claude Code <claude@anthropic.com>"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "AI Fix: CI failure on main" \
            --body "Automated fix for CI failure on commit ${{ github.event.workflow_run.head_sha }}.

          ## What failed
          The CI pipeline failed. Claude analyzed the logs and proposed this fix.

          ## Review
          Please review the changes before merging.

          ---
          🤖 Generated by Claude Code" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue if no fix found
        if: steps.changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failure needs manual fix (${context.payload.workflow_run.head_sha.slice(0, 7)})`,
              body: `The CI pipeline failed on main and the AI agent could not auto-fix it.\n\n**Commit:** ${context.payload.workflow_run.head_sha}\n**Run:** ${context.payload.workflow_run.html_url}\n\n**Failure logs (tail):**\n\`\`\`\n${{ steps.logs.outputs.failure_logs }}\n\`\`\`\n\n---\n🤖 Generated by Claude Code`,
              labels: ['bug', 'ci-failure'],
            });
