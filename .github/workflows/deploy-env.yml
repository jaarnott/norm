name: Deploy Environment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      REGION: australia-southeast1
      # Images are always built and stored in the testing project's Artifact Registry
      REGISTRY: australia-southeast1-docker.pkg.dev/norm-testing/norm

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run database migrations
        run: |
          gcloud run jobs execute norm-migrate-${{ inputs.environment }} \
            --region $REGION \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --wait \
            2>&1 || echo "Migration job not found — skipping (migrations run via Cloud SQL proxy)"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run services update norm-api-${{ inputs.environment }} \
            --image $REGISTRY/norm-api:${{ inputs.image_tag }} \
            --region $REGION \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --quiet

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run services update norm-web-${{ inputs.environment }} \
            --image $REGISTRY/norm-web:${{ inputs.image_tag }} \
            --region $REGION \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --quiet

      - name: Smoke test
        run: |
          API_URL=$(gcloud run services describe norm-api-${{ inputs.environment }} \
            --region $REGION \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)")

          echo "Testing API at $API_URL"
          for i in 1 2 3 4 5 6; do
            if curl -sf "$API_URL/health" > /dev/null 2>&1; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 6 attempts"
          exit 1

      - name: Report deploy status
        if: always()
        run: |
          API_URL=$(gcloud run services describe norm-api-${{ inputs.environment }} \
            --region $REGION \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --format "value(status.url)" 2>/dev/null || echo "")

          if [ -n "$API_URL" ]; then
            curl -sS -X POST "$API_URL/api/admin/deploy-webhook" \
              -H "Content-Type: application/json" \
              -d '{
                "environment": "${{ inputs.environment }}",
                "image_tag": "${{ inputs.image_tag }}",
                "git_sha": "${{ github.sha }}",
                "status": "${{ job.status }}",
                "commit_message": "${{ github.event.head_commit.message || 'manual deploy' }}",
                "logs_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "triggered_by": "github-actions"
              }' || echo "Deploy webhook failed (non-fatal)"
          fi
