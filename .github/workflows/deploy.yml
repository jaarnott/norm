name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - testing
          - staging
          - production
      image_tag:
        description: "Image tag (git SHA) to deploy"
        required: true
        type: string

# Only allow one deploy at a time
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'pipeline' }}
  cancel-in-progress: false

jobs:
  # ── Build once, promote everywhere ──────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment: testing
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ github.event.workflow_run.head_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker australia-southeast1-docker.pkg.dev --quiet

      - name: Build & push API image
        run: |
          docker build -f apps/api/Dockerfile apps/api \
            -t australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/norm/norm-api:${{ github.event.workflow_run.head_sha }} \
            -t australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/norm/norm-api:latest
          docker push australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/norm/norm-api:${{ github.event.workflow_run.head_sha }}
          docker push australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/norm/norm-api:latest

      - name: Build & push Web image
        run: |
          docker build -f apps/web/Dockerfile . \
            -t australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/norm/norm-web:${{ github.event.workflow_run.head_sha }} \
            -t australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/norm/norm-web:latest
          docker push australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/norm/norm-web:${{ github.event.workflow_run.head_sha }}
          docker push australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/norm/norm-web:latest

  # ── Deploy to testing (auto) ────────────────────────────────────
  deploy-testing:
    name: Deploy to Testing
    needs: build-and-push
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: testing
      image_tag: ${{ needs.build-and-push.outputs.image_tag }}
    secrets: inherit

  # ── Run E2E tests against testing ────────────────────────────────
  e2e-testing:
    name: E2E Tests (Testing)
    needs: deploy-testing
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/e2e-tests.yml
    with:
      environment: testing
      target_url: https://testing.bettercallnorm.com
    secrets: inherit

  # ── Deploy to staging (auto after testing + E2E pass) ──────────
  deploy-staging:
    name: Deploy to Staging
    needs: [build-and-push, deploy-testing, e2e-testing]
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: staging
      image_tag: ${{ needs.build-and-push.outputs.image_tag }}
    secrets: inherit

  # ── Deploy to production (auto, after staging) ──────────────────
  # Norm has no live end users yet, so every green build ships straight to
  # production. The gates are the CI run and the E2E suite against testing
  # above — if either fails the pipeline stops before this job. Database
  # migrations run first via the norm-migrate-production Cloud Run job (see
  # deploy-env.yml). To pin a specific SHA or roll back, use the manual job
  # below. When Norm has real users, reinstate a gate here (either drop this
  # job back to workflow_dispatch only, or add a required reviewer to the
  # "production" GitHub environment, which pauses this job for approval).
  deploy-production:
    name: Deploy to Production
    needs: [build-and-push, deploy-staging]
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: production
      image_tag: ${{ needs.build-and-push.outputs.image_tag }}
    secrets: inherit

  # ── Deploy to production (manual: pin a SHA or roll back) ───────
  deploy-production-manual:
    name: Deploy to Production (manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: production
      image_tag: ${{ github.event.inputs.image_tag }}
    secrets: inherit
