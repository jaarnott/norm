name: E2E Tests

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      target_url:
        required: true
        type: string

jobs:
  e2e:
    name: E2E Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.49.0-noble

    steps:
      - uses: actions/checkout@v4

      - name: Install E2E dependencies
        working-directory: apps/e2e
        run: npm install

      - name: Run E2E test suite
        working-directory: apps/e2e
        env:
          BASE_URL: ${{ inputs.target_url }}
          API_URL: ${{ inputs.target_url }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL || 'admin@norm.local' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'changeme123' }}
        run: |
          API_TOKEN=$(curl -s -X POST "$API_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$E2E_ADMIN_EMAIL\",\"password\":\"$E2E_ADMIN_PASSWORD\"}" \
            | python3 -c "import sys,json;print(json.load(sys.stdin).get('access_token',''))")
          if [ -z "$API_TOKEN" ]; then
            echo "Failed to log in to $API_URL as $E2E_ADMIN_EMAIL"
            exit 1
          fi
          API_TOKEN=$API_TOKEN node runner.mjs
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ inputs.environment }}
          path: apps/e2e/results/
          retention-days: 14
