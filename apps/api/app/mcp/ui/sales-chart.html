<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Norm — Sales</title>
<style>/*__NORM_BASE_CSS__*/
  svg { display:block; width:100%; height:auto; overflow:visible; }
  .bar { fill:var(--bar); transition:fill .12s; }
  .bar:hover { fill:var(--bar-hi); }
  .axis { stroke:var(--line); stroke-width:1; }
  .glabel { fill:var(--muted); font-size:10px; }
  .vlabel { fill:var(--muted); font-size:9px; }
</style>
</head>
<body>
<div id="root">
  <div class="head"><span class="brand">Norm</span><span class="figure" id="total"></span></div>
  <p class="sub" id="sub">Loading sales…</p>
  <div id="chart"></div>
</div>
<script>/*__NORM_BRIDGE__*/</script>
<script>
(function () {
  "use strict";
  var LABEL_KEYS = ["period","date","day","label","name","interval","time","bucket","week","month","start","start_date","datetime"];
  var VALUE_KEYS = ["total","total_sales","sales","value","amount","revenue","net","gross","net_sales","sales_total","turnover","takings","total_amount"];

  function num(v) {
    if (typeof v === "number") return isFinite(v) ? v : null;
    if (v && typeof v === "object") {
      var ks = ["amount", "value", "total"];
      for (var i = 0; i < ks.length; i++) if (ks[i] in v) return num(v[ks[i]]);
      return null;
    }
    if (typeof v === "string") {
      var n = parseFloat(v.replace(/[^0-9.\-]/g, "")); return isFinite(n) ? n : null;
    }
    return null;
  }
  function pick(o, keys) {
    if (!o || typeof o !== "object") return undefined;
    var lower = {}; Object.keys(o).forEach(function (k) { lower[k.toLowerCase()] = o[k]; });
    for (var i = 0; i < keys.length; i++) if (lower[keys[i]] != null) return lower[keys[i]];
    return undefined;
  }
  // Find the most chart-like array of records anywhere in the payload.
  function findSeries(root) {
    var best = null, bestScore = -1, seen = 0;
    (function walk(n) {
      if (seen++ > 5000 || n == null) return;
      if (Array.isArray(n)) {
        if (n.length && typeof n[0] === "object" && n[0] !== null) {
          var rows = n.filter(function (r) { return r && typeof r === "object"; });
          var score = rows.filter(function (r) { return num(pick(r, VALUE_KEYS)) != null; }).length;
          if (score > bestScore) { bestScore = score; best = rows; }
        }
        n.forEach(walk);
      } else if (typeof n === "object") { Object.keys(n).forEach(function (k) { walk(n[k]); }); }
    })(root);
    return bestScore > 0 ? best : null;
  }

  function fmt(n) {
    try { return new Intl.NumberFormat(undefined, { maximumFractionDigits: n % 1 ? 2 : 0 }).format(n); }
    catch (e) { return String(n); }
  }
  function fmtMoney(n) {
    var cents = Math.round(n * 100) % 100 !== 0;
    try {
      return "$" + new Intl.NumberFormat(undefined, {
        minimumFractionDigits: cents ? 2 : 0, maximumFractionDigits: cents ? 2 : 0,
      }).format(n);
    } catch (e) { return "$" + fmt(Math.round(n * 100) / 100); }
  }
  function esc(s) { return String(s == null ? "" : s)
    .replace(/[&<>]/g, function (c) { return ({ "&":"&amp;","<":"&lt;",">":"&gt;" })[c]; }); }

  function labelOf(v) {
    if (v == null) return "";
    if (typeof v === "string") {
      var iso = v.match(/^(\d{4}-\d{2}-\d{2})/);
      if (iso) return iso[1].slice(5); // MM-DD
      return v.length > 10 ? v.slice(0, 10) : v;
    }
    return String(v);
  }
  function setSub(t) { document.getElementById("sub").textContent = t; }
  function fail(msg) {
    document.getElementById("total").textContent = "";
    setSub("");
    document.getElementById("chart").innerHTML = '<p class="err">' + esc(msg) + "</p>";
  }

  NormApp.onResult(function (params) {
    var data = params && params.structuredContent;
    if (data == null && params && Array.isArray(params.content)) {
      var t = params.content.find(function (c) { return c && c.type === "text"; });
      if (t) { try { data = JSON.parse(t.text); } catch (e) {} }
    }
    if (params && params.isError) return fail("Norm returned an error for this request.");
    if (data == null) return fail("No data to display.");
    var trunc = NormApp.truncationMessage(data);
    if (trunc) return fail(trunc);
    data = NormApp.unwrap(data);

    var rows = findSeries(data);
    if (!rows || !rows.length) {
      var scalar = num(pick(data, VALUE_KEYS));
      if (scalar != null) {
        document.getElementById("total").textContent = fmtMoney(scalar);
        setSub("Total sales");
        document.getElementById("chart").innerHTML = "";
        return;
      }
      return fail("This result has no sales series to chart.");
    }

    var series = rows.map(function (r) {
      return { label: labelOf(pick(r, LABEL_KEYS)), value: num(pick(r, VALUE_KEYS)) || 0 };
    });
    renderChart(series);
  });

  function renderChart(series) {
    var total = series.reduce(function (s, d) { return s + d.value; }, 0);
    document.getElementById("total").textContent = fmtMoney(total);
    setSub(series.length + (series.length === 1 ? " period" : " periods") + " · hover a bar for detail");

    var max = Math.max.apply(null, series.map(function (d) { return d.value; })) || 1;
    var W = 720, H = 260, padL = 8, padR = 8, padT = 10, padB = 26;
    var innerW = W - padL - padR, innerH = H - padT - padB;
    var n = series.length;
    var gap = n > 1 ? Math.min(10, innerW / n * 0.25) : 0;
    var bw = (innerW - gap * (n - 1)) / n;
    var every = Math.ceil(n / 12);

    var bars = series.map(function (d, i) {
      var h = Math.max(1, (d.value / max) * innerH);
      var x = padL + i * (bw + gap), y = padT + (innerH - h);
      var lbl = (i % every === 0)
        ? '<text class="glabel" x="' + (x + bw / 2) + '" y="' + (H - 9) + '" text-anchor="middle">' + esc(d.label) + "</text>" : "";
      var val = bw > 22
        ? '<text class="vlabel" x="' + (x + bw / 2) + '" y="' + (y - 3) + '" text-anchor="middle">' + esc(fmt(d.value)) + "</text>" : "";
      return '<rect class="bar" x="' + x.toFixed(1) + '" y="' + y.toFixed(1) +
             '" width="' + bw.toFixed(1) + '" height="' + h.toFixed(1) + '" rx="2">' +
             "<title>" + esc(d.label) + ": " + esc(fmtMoney(d.value)) + "</title></rect>" + val + lbl;
    }).join("");

    var baseY = padT + innerH;
    document.getElementById("chart").innerHTML =
      '<svg viewBox="0 0 ' + W + " " + H + '" role="img" aria-label="Sales by period">' +
      '<line class="axis" x1="' + padL + '" y1="' + baseY + '" x2="' + (W - padR) + '" y2="' + baseY + '"/>' +
      bars + "</svg>";
  }
})();
</script>
</body>
</html>
