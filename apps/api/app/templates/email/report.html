{% extends "base.html" %}
{% block content %}
<h1 style="font-size: 18px; font-weight: 700; margin: 0 0 20px; color: #333;">{{ subject }}</h1>
<div style="line-height: 1.6; font-size: 14px; color: #444;">
  {{ report_html | safe }}
</div>
{% if thread_url %}
<div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #e8e4de;">
  <a href="{{ thread_url }}" class="btn" style="display: inline-block; padding: 10px 20px; background: #c4a882; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 13px;">View in Norm</a>
</div>
{% endif %}
{% endblock %}
{% block footer_extra %}
<p style="font-size: 11px; color: #bbb; margin-top: 4px;">This report was generated by Norm{% if generated_at %} on {{ generated_at }}{% endif %}.</p>
{% endblock %}
