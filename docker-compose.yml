services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: norm
      POSTGRES_PASSWORD: norm
      POSTGRES_DB: norm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U norm"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: apps/api
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://norm:norm@postgres:5432/norm
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: apps/api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://norm:norm@postgres:5432/norm
      ENVIRONMENT: local
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
